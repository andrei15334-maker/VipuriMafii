<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Vipuri Roleplay Mafia Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container flex-center">
    <div class="login-card glass-panel">
      <!-- Try loading logo, fallback to clean text logo if missing -->
      <img class="login-logo" src="logo.png" alt="V" onerror="this.style.display='none'; document.getElementById('text-logo').style.display='block';">
      <div id="text-logo" style="display: none; font-size: 4rem; font-weight: 900; color: #ff3333; text-shadow: 0 0 10px rgba(255,51,51,0.5);">V</div>
      
      <div>
        <h1 class="login-title">VIPURI ROLEPLAY</h1>
        <p class="login-subtitle" style="text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; color: #ff3333; font-weight: 700; margin-top: 4px;">Mafia Management Panel</p>
      </div>

      <p class="login-subtitle">
        Autentifică-te cu contul tău de Discord pentru a accesa panoul administrativ al mafiei tale sau cel global.
      </p>

      <a href="/auth/login" class="btn-primary" style="text-decoration: none;">
        <svg style="width: 24px; height: 24px;" viewBox="0 0 127.14 96.36" fill="currentColor">
          <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.43-5c.87-.64,1.72-1.32,2.53-2a75.46,75.46,0,0,0,72.76,0c.81.7,1.66,1.38,2.53,2a68.43,68.43,0,0,1-10.43,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31-18.83C129.81,48.54,123.6,25.79,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/>
        </svg>
        Conectează-te cu Discord
      </a>

      <!-- Dev Mode Bypass Login (Crucial for testing without Client Secret configuration) -->
      <div class="dev-login-section">
        <h2 class="dev-login-title">Conectare rapidă (Mod Dev)</h2>
        <p class="login-subtitle" style="font-size: 0.8rem; margin-bottom: 12px;">Introdu ID-ul tău de Discord pentru a te conecta rapid la panel în modul local de testare:</p>
        <div id="dev-error" style="color: #ff3333; font-size: 0.85rem; margin-bottom: 10px; display: none;"></div>
        <input type="text" id="dev-user-id" class="input-field" placeholder="Ex: 279564882956288000">
        <button id="dev-login-btn" class="btn-primary" style="background: #252530; color: #fff; box-shadow: none;">
          Autentificare Dev
        </button>
      </div>
    </div>
  </div>

  <script>
    // Extract query parameters to show errors
    const urlParams = new URLSearchParams(window.location.search);
    const errorParam = urlParams.get('error');
    if (errorParam) {
      const devError = document.getElementById('dev-error');
      devError.style.display = 'block';
      if (errorParam === 'oauth_not_configured') {
        devError.innerText = 'Discord OAuth2 nu este complet configurat (lipsește CLIENT_SECRET în .env). Folosește modul Dev de mai jos!';
      } else if (errorParam === 'oauth_failed') {
        devError.innerText = 'Logarea prin Discord OAuth2 a eșuat. Verifică datele din .env.';
      } else {
        devError.innerText = `Autentificarea a eșuat: ${errorParam}`;
      }
    }

    // Dev Login Handler
    document.getElementById('dev-login-btn').addEventListener('click', async () => {
      const userId = document.getElementById('dev-user-id').value.trim();
      const devError = document.getElementById('dev-error');
      
      if (!userId) {
        devError.style.display = 'block';
        devError.innerText = 'Te rog introdu un ID valid de Discord.';
        return;
      }

      devError.style.display = 'none';

      try {
        const response = await fetch('/auth/dev-login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ userId })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          window.location.href = data.redirect;
        } else {
          devError.style.display = 'block';
          devError.innerText = data.error || 'Autentificare eșuată.';
        }
      } catch (err) {
        devError.style.display = 'block';
        devError.innerText = 'Eroare la conectare. Verifică dacă botul rulează.';
      }
    });
  </script>
</body>
</html>
